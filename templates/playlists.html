<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Playlists - FPS Vault</title>
    <style>
        body {
            background: #08080a;
            color: white;
            font-family: sans-serif;
            margin: 0;
        }

        nav {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(8, 8, 10, 0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 4px;
            text-decoration: none;
            cursor: pointer;
            font-style: italic;
            text-shadow: 0 0 10px #e50914, 3px 3px 0px #550000;
            transition: transform 0.3s ease, text-shadow 0.3s ease;
        }

        .logo span {
            color: #e50914;
            text-shadow: 3px 3px 0px #222;
        }

        .logo:hover {
            transform: scale(1.05) skewX(-5deg);
            text-shadow: 0 0 20px #e50914, 4px 4px 0px #550000;
        }

        .search-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 0 40px;
        }

        .search-bar {
            width: 100%;
            max-width: 650px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s, background 0.3s;
        }

        .search-bar:focus {
            border-color: #e50914;
            background: rgba(0, 0, 0, 0.8);
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-links a {
            color: #f5f5f5;
            text-decoration: none;
            font-size: 18px;
            transition: color 0.2s, transform 0.2s, background 0.2s;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: #e50914;
        }

        .nav-links a.playlist-link {
            color: #aaa;
            font-weight: 600;
        }

        .nav-links a.playlist-link:hover {
            color: #ffd700;
            transform: scale(1.05);
        }

        .nav-links a.logout-btn {
            color: #888;
            background: transparent;
            padding: 5px 12px;
            border-radius: 4px;
            font-weight: 600;
        }

        .nav-links a.logout-btn:hover {
            background: #e50914;
            color: white;
        }

        .profile-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .profile-btn:hover {
            border-color: #e50914;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
        }

        .btn-create {
            background: #e50914;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-create:hover {
            background: #ff0a16;
        }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .playlist-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            position: relative;
        }

        .playlist-card:hover {
            border-color: #e50914;
            transform: translateY(-5px);
        }

        .playlist-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .playlist-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .playlist-count {
            color: #aaa;
            font-size: 13px;
        }

        .playlist-visibility {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 14px;
        }

        /* Simple Modal for creating a playlist */
        #create-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            border: 1px solid #333;
        }

        .modal-input {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            outline: none;
        }
    </style>
</head>

<body>
    <nav>
        <a href="javascript:void(0)" class="logo" onclick="navigate('/')">FPS<span>-</span>VAULT</a>
        <div class="search-container">
            <input id="search-input" class="search-bar" type="text"
                placeholder="Search live streams, channels, or games...">
        </div>
        <div class="nav-links" id="auth-section">
            <a href="/login" style="color: white; font-weight: bold;">Login</a>
            <a href="/register"
                style="background: #e50914; padding: 5px 15px; border-radius: 4px; color: white; text-decoration: none;">Sign
                Up</a>
        </div>
    </nav>

    <div class="container">
        <div class="header-row">
            <h1>My Playlists</h1>
            <button class="btn-create" onclick="document.getElementById('create-modal').style.display='flex'">+ New
                Playlist</button>
        </div>

        <div class="playlist-grid" id="playlist-grid">
            <p style="color: #666;">Loading playlists...</p>
        </div>
    </div>

    <div id="create-modal">
        <div class="modal-content">
            <h3 style="margin-top: 0;">Create a Playlist</h3>
            <input type="text" id="new-playlist-title" class="modal-input" placeholder="E.g., Chill Beats">

            <select id="new-playlist-visibility" class="modal-input" style="margin-bottom: 25px; width: 97%;">
                <option value="private">🔒 Private (Only you)</option>
                <option value="public">🌍 Public (Searchable)</option>
            </select>

            <div style="display: flex; gap: 10px; justify-content: center;">
                <button onclick="document.getElementById('create-modal').style.display='none'"
                    style="background: #333; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">Cancel</button>
                <button onclick="createPlaylist()"
                    style="background: #e50914; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">Create</button>
            </div>
        </div>
    </div>

    <script>
        async function loadPlaylists() {
            try {
                const res = await fetch('/api/playlists');
                const playlists = await res.json();
                const grid = document.getElementById('playlist-grid');
                grid.innerHTML = '';

                if (playlists.length === 0) {
                    grid.innerHTML = '<p style="color: #666; grid-column: 1 / -1;">You haven\'t created any playlists yet.</p>';
                    return;
                }

                playlists.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'playlist-card';

                    // Add a tiny icon to show if it's public or private
                    const visibilityIcon = p.visibility === 'public' ? '🌍' : '🔒';

                    card.innerHTML = `
                        <div class="playlist-visibility">${visibilityIcon}</div>
                        <div class="playlist-icon">📁</div>
                        <div class="playlist-title">${p.name}</div>
                        <div class="playlist-count">${p.video_count} videos</div>
                    `;
                    // When clicked, we will eventually navigate to a playlist view page
                    card.onclick = () => window.location.href = '/play/playlist/' + p.playlist_id;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function createPlaylist() {
            const titleBox = document.getElementById('new-playlist-title');
            const visibilityBox = document.getElementById('new-playlist-visibility');
            if (!titleBox.value) return;

            const res = await fetch('/api/playlists', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: titleBox.value,
                    visibility: visibilityBox.value
                })
            });

            if (res.ok) {
                titleBox.value = '';
                document.getElementById('create-modal').style.display = 'none';
                loadPlaylists(); // Refresh the grid instantly
            } else {
                const err = await res.json();
                alert("Error: " + err.error);
            }
        }

        loadPlaylists();
    </script>
    <script>
        function navigate(path) {
            if (window.location.protocol.startsWith('blob')) {
                const msg = document.createElement('div');
                msg.innerText = `Redirecting to ${path}...`;
                msg.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#e50914; color:white; padding:10px 20px; border-radius:20px; z-index:9999; font-weight:bold;";
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 1500);
            } else {
                window.location.href = path;
            }
        }

        async function checkAuthStatus() {
            const authSection = document.getElementById('auth-section');
            if (!authSection) return;
            try {
                if (window.location.protocol.startsWith('blob')) return;
                const response = await fetch('/api/current_user');
                const data = await response.json();
                if (data.logged_in) {
                    authSection.innerHTML = `
                        <span style="font-weight: bold; color: #e50914;">Welcome, ${data.username}</span>
                        <a href="javascript:void(0)" onclick="navigate('/upload')" class="playlist-link" style="text-decoration: none;">+ Upload</a>
                        <a href="javascript:void(0)" onclick="navigate('/playlists')" class="playlist-link" style="text-decoration: none;">Playlists</a>
                        <a href="javascript:void(0)" onclick="logout()" class="logout-btn" style="text-decoration: none;">Logout</a>
                        <div class="profile-btn" onclick="navigate('/profile')"></div>
                    `;
                }
            } catch (error) {
                console.warn('Auth check failed:', error);
            }
        }

        async function logout() {
            if (!window.location.protocol.startsWith('blob')) {
                await fetch('/api/logout', { method: 'POST' });
                window.location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        const query = this.value.trim();
                        if (query) window.location.href = '/search?q=' + encodeURIComponent(query);
                    }
                });
            }
            checkAuthStatus();
        });
    </script>
</body>

</html>
