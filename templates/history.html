<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Watch History - FPS Vault</title>
    <style>
        body {
            background: #08080a;
            color: white;
            font-family: sans-serif;
            margin: 0;
        }

        nav {
            background: rgba(8, 8, 10, 0.9);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            font-style: italic;
        }

        .logo span {
            color: #e50914;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 28px;
        }

        .history-item {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            align-items: flex-start;
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: translateX(10px);
        }

        .thumb-wrapper {
            position: relative;
            width: 240px;
            min-width: 240px;
            aspect-ratio: 16/9;
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .thumb-img {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        /* The Red Progress Bar! */
        .progress-bar-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
        }

        .progress-bar-fill {
            height: 100%;
            background: #e50914;
            width: 0%;
        }

        .video-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 5px;
        }

        .v-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
            cursor: pointer;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .v-meta {
            color: #aaa;
            font-size: 13px;
            margin: 0;
        }

        .v-channel {
            color: #888;
            font-size: 13px;
            margin: 0;
            cursor: pointer;
        }

        .v-channel:hover {
            color: white;
        }

        .empty-state {
            text-align: center;
            color: #666;
            margin-top: 100px;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <nav>
        <a href="/" class="logo">FPS<span>-</span>VAULT</a>
        <a href="/" style="color: #aaa; text-decoration: none;">← Home</a>
    </nav>

    <div class="container">
        <h1>Watch History</h1>
        <div id="history-list">
            <div class="empty-state">Loading your history...</div>
        </div>
    </div>

    <script>
        async function loadHistory() {
            try {
                const res = await fetch('/api/history');
                const history = await res.json();

                if (history.error) {
                    throw new Error("Backend Error: " + history.error);
                }
                const container = document.getElementById('history-list');
                container.innerHTML = '';

                if (history.length === 0) {
                    container.innerHTML = '<div class="empty-state">You haven\'t watched any videos yet!</div>';
                    return;
                }

                history.forEach(v => {
                    // Safe thumbnail formatting via your proxy
                    let thumb = v.thumbnail_url;
                    if (thumb && thumb.includes('drive.google.com')) {
                        const match = thumb.match(/[\/?]id=(.*?)(&|$)/) || thumb.match(/\/d\/(.*?)\//);
                        if (match) thumb = `/api/proxy_thumb/${match[1]}`;
                    }

                    // Calculate the progress bar width (if duration exists in DB)
                    let progressPercent = 0;
                    if (v.duration && v.duration > 0 && v.watch_progress) {
                        progressPercent = Math.min((v.watch_progress / v.duration) * 100, 100);
                    }

                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerHTML = `
                        <div class="thumb-wrapper" onclick="window.location.href='/watch/${v.video_id}'">
                            <div class="thumb-img" style="background-image: url('${thumb}')"></div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: ${progressPercent}%;"></div>
                            </div>
                        </div>
                        <div class="video-info">
                            <h3 class="v-title" onclick="window.location.href='/watch/${v.video_id}'">${v.title}</h3>
                            <p class="v-channel" onclick="window.location.href='/channel/${v.channel_id}'">${v.channel_name}</p>
                            <p class="v-meta">${v.views_count} views • Watched on ${v.watched_on}</p>
                        </div>
                    `;
                    container.appendChild(item);
                });
            } catch (err) {
                console.error(err);
                // Print the actual error message to the screen!
                document.getElementById('history-list').innerHTML = `<div class="empty-state" style="color:#e50914;">❌ ${err.message}</div>`;
            }
        }

        loadHistory();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: '/' })
                .catch((err) => console.warn('SW registration failed:', err));
        }
    </script>
</body>

</html>
