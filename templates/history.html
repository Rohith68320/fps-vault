<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Watch History - FPS Vault</title>
    <style>
        body {
            background: #08080a;
            color: white;
            font-family: sans-serif;
            margin: 0;
        }

        nav {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(8, 8, 10, 0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 4px;
            text-decoration: none;
            cursor: pointer;
            font-style: italic;
            text-shadow: 0 0 10px #e50914, 3px 3px 0px #550000;
            transition: transform 0.3s ease, text-shadow 0.3s ease;
        }

        .logo span {
            color: #e50914;
            text-shadow: 3px 3px 0px #222;
        }

        .logo:hover {
            transform: scale(1.05) skewX(-5deg);
            text-shadow: 0 0 20px #e50914, 4px 4px 0px #550000;
        }

        .search-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 0 40px;
        }

        .search-bar {
            width: 100%;
            max-width: 650px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s, background 0.3s;
        }

        .search-bar:focus {
            border-color: #e50914;
            background: rgba(0, 0, 0, 0.8);
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-links a {
            color: #f5f5f5;
            text-decoration: none;
            font-size: 18px;
            transition: color 0.2s, transform 0.2s, background 0.2s;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: #e50914;
        }

        .nav-links a.playlist-link {
            color: #aaa;
            font-weight: 600;
        }

        .nav-links a.playlist-link:hover {
            color: #ffd700;
            transform: scale(1.05);
        }

        .nav-links a.logout-btn {
            color: #888;
            background: transparent;
            padding: 5px 12px;
            border-radius: 4px;
            font-weight: 600;
        }

        .nav-links a.logout-btn:hover {
            background: #e50914;
            color: white;
        }

        .profile-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .profile-btn:hover {
            border-color: #e50914;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 28px;
        }

        .history-item {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            align-items: flex-start;
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: translateX(10px);
        }

        .thumb-wrapper {
            position: relative;
            width: 240px;
            min-width: 240px;
            aspect-ratio: 16/9;
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .thumb-img {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        /* The Red Progress Bar! */
        .progress-bar-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
        }

        .progress-bar-fill {
            height: 100%;
            background: #e50914;
            width: 0%;
        }

        .video-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 5px;
        }

        .v-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
            cursor: pointer;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .v-meta {
            color: #aaa;
            font-size: 13px;
            margin: 0;
        }

        .v-channel {
            color: #888;
            font-size: 13px;
            margin: 0;
            cursor: pointer;
        }

        .v-channel:hover {
            color: white;
        }

        .empty-state {
            text-align: center;
            color: #666;
            margin-top: 100px;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <nav>
        <a href="javascript:void(0)" class="logo" onclick="navigate('/')">FPS<span>-</span>VAULT</a>
        <div class="search-container">
            <input id="search-input" class="search-bar" type="text"
                placeholder="Search live streams, channels, or games...">
        </div>
        <div class="nav-links" id="auth-section">
            <a href="/login" style="color: white; font-weight: bold;">Login</a>
            <a href="/register"
                style="background: #e50914; padding: 5px 15px; border-radius: 4px; color: white; text-decoration: none;">Sign
                Up</a>
        </div>
    </nav>

    <div class="container">
        <h1>Watch History</h1>
        <div id="history-list">
            <div class="empty-state">Loading your history...</div>
        </div>
    </div>

    <script>
        async function loadHistory() {
            try {
                const res = await fetch('/api/history');
                const history = await res.json();

                if (history.error) {
                    throw new Error("Backend Error: " + history.error);
                }
                const container = document.getElementById('history-list');
                container.innerHTML = '';

                if (history.length === 0) {
                    container.innerHTML = '<div class="empty-state">You haven\'t watched any videos yet!</div>';
                    return;
                }

                history.forEach(v => {
                    // Safe thumbnail formatting via your proxy
                    let thumb = v.thumbnail_url;
                    if (thumb && thumb.includes('drive.google.com')) {
                        const match = thumb.match(/[\/?]id=(.*?)(&|$)/) || thumb.match(/\/d\/(.*?)\//);
                        if (match) thumb = `/api/proxy_thumb/${match[1]}`;
                    }

                    // Calculate the progress bar width (if duration exists in DB)
                    let progressPercent = 0;
                    if (v.duration && v.duration > 0 && v.watch_progress) {
                        progressPercent = Math.min((v.watch_progress / v.duration) * 100, 100);
                    }

                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerHTML = `
                        <div class="thumb-wrapper" onclick="window.location.href='/watch/${v.video_id}'">
                            <div class="thumb-img" style="background-image: url('${thumb}')"></div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: ${progressPercent}%;"></div>
                            </div>
                        </div>
                        <div class="video-info">
                            <h3 class="v-title" onclick="window.location.href='/watch/${v.video_id}'">${v.title}</h3>
                            <p class="v-channel" onclick="window.location.href='/channel/${v.channel_id}'">${v.channel_name}</p>
                            <p class="v-meta">${v.views_count} views • Watched on ${v.watched_on}</p>
                        </div>
                    `;
                    container.appendChild(item);
                });
            } catch (err) {
                console.error(err);
                // Print the actual error message to the screen!
                document.getElementById('history-list').innerHTML = `<div class="empty-state" style="color:#e50914;">❌ ${err.message}</div>`;
            }
        }

        loadHistory();
    </script>
    <script>
        function navigate(path) {
            if (window.location.protocol.startsWith('blob')) {
                const msg = document.createElement('div');
                msg.innerText = `Redirecting to ${path}...`;
                msg.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#e50914; color:white; padding:10px 20px; border-radius:20px; z-index:9999; font-weight:bold;";
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 1500);
            } else {
                window.location.href = path;
            }
        }

        async function checkAuthStatus() {
            const authSection = document.getElementById('auth-section');
            if (!authSection) return;
            try {
                if (window.location.protocol.startsWith('blob')) return;
                const response = await fetch('/api/current_user');
                const data = await response.json();
                if (data.logged_in) {
                    authSection.innerHTML = `
                        <span style="font-weight: bold; color: #e50914;">Welcome, ${data.username}</span>
                        <a href="javascript:void(0)" onclick="navigate('/upload')" class="playlist-link" style="text-decoration: none;">+ Upload</a>
                        <a href="javascript:void(0)" onclick="navigate('/playlists')" class="playlist-link" style="text-decoration: none;">Playlists</a>
                        <a href="javascript:void(0)" onclick="logout()" class="logout-btn" style="text-decoration: none;">Logout</a>
                        <div class="profile-btn" onclick="navigate('/profile')"></div>
                    `;
                }
            } catch (error) {
                console.warn('Auth check failed:', error);
            }
        }

        async function logout() {
            if (!window.location.protocol.startsWith('blob')) {
                await fetch('/api/logout', { method: 'POST' });
                window.location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        const query = this.value.trim();
                        if (query) window.location.href = '/search?q=' + encodeURIComponent(query);
                    }
                });
            }
            checkAuthStatus();
        });
    </script>
</body>

</html>
