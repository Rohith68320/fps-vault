<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Channel - FPS Vault</title>
    <style>
        body { background: #08080a; color: white; font-family: sans-serif; margin: 0; }
        nav { background: rgba(8, 8, 10, 0.9); padding: 15px 40px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .logo { font-size: 24px; font-weight: 900; color: #fff; text-decoration: none; font-style: italic; }
        .logo span { color: #e50914; }

        .channel-header { background: #141414; padding: 40px; text-align: center; border-bottom: 1px solid #333; }
        .channel-avatar { width: 100px; height: 100px; background: #e50914; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; }
        .channel-name { font-size: 32px; margin: 0 0 10px 0; }
        .channel-stats { color: #aaa; margin-bottom: 20px; }
        .btn-subscribe { background: white; color: black; border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 16px; }

        .content-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        /* The Video Grid */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background: #1a1a1a; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; text-decoration: none; color: white; display: block;}
        .video-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3); }
        
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: #333; object-fit: cover; }
        .video-info { padding: 15px; }
        .video-title { font-size: 16px; margin: 0 0 8px 0; font-weight: bold; line-height: 1.4; }
        .video-meta { color: #aaa; font-size: 13px; }

        #loading { text-align: center; padding: 50px; font-size: 20px; color: #888; }
        #channel-content { display: none; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">FPS<span>-</span>VAULT</a>
        <a href="/" style="color: #aaa; text-decoration: none;">← Home</a>
    </nav>

    <div id="loading">Loading Channel Data...</div>

    <div id="channel-content">
        <div class="channel-header">
            <div class="channel-avatar" id="c-avatar">C</div>
            <h1 class="channel-name" id="c-name">Channel Name</h1>
            <p class="channel-stats"><span id="c-subs">0</span> Subscribers</p>
            <p style="max-width: 600px; margin: 0 auto 20px; color: #ccc;" id="c-desc"></p>
            <button class="btn-subscribe">Subscribe</button>
        </div>

        <div class="content-container">
            <h2>Videos</h2>
            <div class="video-grid" id="video-grid">
                </div>
        </div>
    </div>

    <script>
        // Extract the channel ID from the URL (e.g., /channel/1 -> 1)
        const channelId = window.location.pathname.split('/').pop();

        async function loadChannel() {
            try {
                const res = await fetch(`/api/channel/${channelId}`);
                if (!res.ok) throw new Error("Channel not found");
                const data = await res.json();

                // Populate Header
                document.getElementById('c-name').innerText = data.channel_name;
                document.getElementById('c-subs').innerText = data.subscriber_cnt;
                document.getElementById('c-desc').innerText = data.description || "";
                document.getElementById('c-avatar').innerText = data.channel_name.charAt(0).toUpperCase();

                // Populate Videos
                const grid = document.getElementById('video-grid');
                grid.innerHTML = ''; // Clear out the grid

                if (data.videos.length === 0) {
                    grid.innerHTML = "<p style='color: #888;'>This channel hasn't uploaded any videos yet.</p>";
                } else {
                    data.videos.forEach(video => {
                        // NEW: Google Drive Image Converter!
                        let thumbUrl = video.thumbnail_url;
                        if (thumbUrl && thumbUrl.includes('drive.google.com/file/d/')) {
                            // Extract the secret File ID using Regex
                            const match = thumbUrl.match(/\/d\/(.*?)\//);
                            if (match && match[1]) {
                                // Convert it to Google's hidden thumbnail API!
                                thumbUrl = `https://drive.google.com/thumbnail?id=${match[1]}&sz=w640`;
                            }
                        } else if (!thumbUrl) {
                            thumbUrl = 'https://via.placeholder.com/640x360.png?text=No+Thumbnail';
                        }

                        // Create a clickable card for each video
                        const card = document.createElement('a');
                        card.href = `/watch/${video.video_id}`;
                        card.className = 'video-card';
                        
                        card.innerHTML = `
                            <img src="${thumbUrl}" class="thumbnail" alt="Thumbnail">
                            <div class="video-info">
                                <h3 class="video-title">${video.title}</h3>
                                <p class="video-meta">${video.views_count} views • ${video.upload_date}</p>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }

                // Show Content
                document.getElementById('loading').style.display = 'none';
                document.getElementById('channel-content').style.display = 'block';

            } catch (error) {
                document.getElementById('loading').innerText = "❌ Channel not found.";
                document.getElementById('loading').style.color = "#e50914";
            }
        }

        loadChannel();
    </script>
</body>
</html>
