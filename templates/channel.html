<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Channel - FPS Vault</title>
    <style>
        body {
            background: #08080a;
            color: white;
            font-family: sans-serif;
            margin: 0;
        }

        nav {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(8, 8, 10, 0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 4px;
            text-decoration: none;
            cursor: pointer;
            font-style: italic;
            text-shadow: 0 0 10px #e50914, 3px 3px 0px #550000;
            transition: transform 0.3s ease, text-shadow 0.3s ease;
        }

        .logo span {
            color: #e50914;
            text-shadow: 3px 3px 0px #222;
        }

        .logo:hover {
            transform: scale(1.05) skewX(-5deg);
            text-shadow: 0 0 20px #e50914, 4px 4px 0px #550000;
        }

        .search-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 0 40px;
        }

        .search-bar {
            width: 100%;
            max-width: 650px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s, background 0.3s;
        }

        .search-bar:focus {
            border-color: #e50914;
            background: rgba(0, 0, 0, 0.8);
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-links a {
            color: #f5f5f5;
            text-decoration: none;
            font-size: 18px;
            transition: color 0.2s, transform 0.2s, background 0.2s;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: #e50914;
        }

        .nav-links a.playlist-link {
            color: #aaa;
            font-weight: 600;
        }

        .nav-links a.playlist-link:hover {
            color: #ffd700;
            transform: scale(1.05);
        }

        /* --- NEW DROPDOWN CSS --- */
        .user-menu-container {
            position: relative;
            display: inline-block;
        }

        .profile-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .profile-btn:hover {
            border-color: #e50914;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.5);
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 55px;
            background-color: #141414;
            min-width: 220px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.8);
            border: 1px solid #333;
            border-radius: 8px;
            z-index: 1000;
            padding: 0;
            overflow: hidden;
        }

        .dropdown-menu.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-header {
            padding: 15px 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        .dropdown-header .user-name {
            margin: 0;
            font-weight: bold;
            color: #fff;
            font-size: 16px;
        }

        .dropdown-item {
            color: #ccc;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            transition: 0.2s;
            font-size: 15px;
        }

        .dropdown-item:hover {
            background-color: #222;
            color: #fff;
        }

        .logout-text {
            color: #e50914 !important;
            border-top: 1px solid #333;
        }

        .logout-text:hover {
            background-color: #e50914 !important;
            color: #fff !important;
        }
        /* ------------------------ */

        .channel-header {
            background: #141414;
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .channel-avatar {
            width: 100px;
            height: 100px;
            background: #e50914;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
        }

        .channel-name {
            font-size: 32px;
            margin: 0 0 10px 0;
        }

        .channel-stats {
            color: #aaa;
            margin-bottom: 20px;
        }

        .btn-subscribe {
            background: white;
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .content-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            color: white;
            display: block;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3);
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #333;
            object-fit: cover;
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-size: 16px;
            margin: 0 0 8px 0;
            font-weight: bold;
            line-height: 1.4;
        }

        .video-meta {
            color: #aaa;
            font-size: 13px;
        }

        #loading {
            text-align: center;
            padding: 50px;
            font-size: 20px;
            color: #888;
        }

        #channel-content {
            display: none;
        }
    </style>
</head>

<body>
    <nav>
        <a href="javascript:void(0)" class="logo" onclick="navigate('/')">FPS<span>-</span>VAULT</a>
        <div class="search-container">
            <input id="search-input" class="search-bar" type="text"
                placeholder="Search live streams, channels, or games...">
        </div>
        <div class="nav-links" id="auth-section">
            <a href="/login" style="color: white; font-weight: bold;">Login</a>
            <a href="/register"
                style="background: #e50914; padding: 5px 15px; border-radius: 4px; color: white; text-decoration: none;">Sign
                Up</a>
        </div>
    </nav>

    <div id="loading">Loading Channel Data...</div>

    <div id="channel-content">
        <div class="channel-header">
            <div class="channel-avatar" id="c-avatar">C</div>
            <h1 class="channel-name" id="c-name">Channel Name</h1>
            <p class="channel-stats"><span id="c-subs">0</span> Subscribers</p>
            <p style="max-width: 600px; margin: 0 auto 20px; color: #ccc;" id="c-desc"></p>
            <button class="btn-subscribe">Subscribe</button>
        </div>

        <div class="content-container">
            <h2>Videos</h2>
            <div class="video-grid" id="video-grid">
            </div>
        </div>
    </div>

    <script>
        const channelId = window.location.pathname.split('/').pop();

        async function loadChannel() {
            try {
                const res = await fetch(`/api/channel/${channelId}`);
                if (!res.ok) throw new Error("Channel not found");
                const data = await res.json();

                document.getElementById('c-name').innerText = data.channel_name;
                document.getElementById('c-subs').innerText = data.subscriber_cnt;
                document.getElementById('c-desc').innerText = data.description || "";
                document.getElementById('c-avatar').innerText = data.channel_name.charAt(0).toUpperCase();

                const grid = document.getElementById('video-grid');
                grid.innerHTML = '';

                if (data.videos.length === 0) {
                    grid.innerHTML = "<p style='color: #888;'>This channel hasn't uploaded any videos yet.</p>";
                } else {
                    data.videos.forEach(video => {
                        let thumbUrl = video.thumbnail_url;
                        if (thumbUrl && thumbUrl.includes('drive.google.com/file/d/')) {
                            const match = thumbUrl.match(/\/d\/(.*?)\//);
                            if (match && match[1]) {
                                thumbUrl = `https://drive.google.com/thumbnail?id=${match[1]}&sz=w640`;
                            }
                        } else if (!thumbUrl) {
                            thumbUrl = 'https://via.placeholder.com/640x360.png?text=No+Thumbnail';
                        }

                        const card = document.createElement('a');
                        card.href = `/watch/${video.video_id}`;
                        card.className = 'video-card';

                        card.innerHTML = `
                            <img src="${thumbUrl}" class="thumbnail" alt="Thumbnail">
                            <div class="video-info">
                                <h3 class="video-title">${video.title}</h3>
                                <p class="video-meta">${video.views_count} views • ${video.upload_date}</p>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('channel-content').style.display = 'block';

            } catch (error) {
                document.getElementById('loading').innerText = "❌ Channel not found.";
                document.getElementById('loading').style.color = "#e50914";
            }
        }

        loadChannel();
    </script>

    <script>
        function navigate(path) {
            if (window.location.protocol.startsWith('blob')) {
                const msg = document.createElement('div');
                msg.innerText = `Redirecting to ${path}...`;
                msg.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#e50914; color:white; padding:10px 20px; border-radius:20px; z-index:9999; font-weight:bold;";
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 1500);
            } else {
                window.location.href = path;
            }
        }

        // Dropdown toggle logic
        function toggleDropdown(event) {
            const dropdown = document.getElementById('userDropdown');
            if (dropdown) {
                dropdown.classList.toggle('show');
            }
            event.stopPropagation(); // Stops the click from bubbling up to the window
        }

        // Close dropdown when clicking anywhere else
        window.addEventListener('click', function (event) {
            const dropdown = document.getElementById('userDropdown');
            if (dropdown && dropdown.classList.contains('show')) {
                dropdown.classList.remove('show');
            }
        });

        async function checkAuthStatus() {
            const authSection = document.getElementById('auth-section');
            if (!authSection) return;
            try {
                if (window.location.protocol.startsWith('blob')) return;
                const response = await fetch('/api/current_user');
                const data = await response.json();
                
                // NEW: Dynamic UI injected with the Dropdown Menu!
                if (data.logged_in) {
                    authSection.innerHTML = `
                        <a href="javascript:void(0)" onclick="navigate('/upload')" class="playlist-link" style="text-decoration: none;">+ Upload</a>
                        
                        <div class="user-menu-container">
                            <div class="profile-btn" onclick="toggleDropdown(event)" 
                                 style="background: url('${data.avatar_url || ''}') center/cover no-repeat #333;">
                            </div>
                            
                            <div class="dropdown-menu" id="userDropdown">
                                <div class="dropdown-header">
                                    <p class="user-name">Hello, ${data.username}</p>
                                </div>
                                <a href="javascript:void(0)" onclick="navigate('/history')" class="dropdown-item">🕒 Watch History</a>
                                <a href="javascript:void(0)" onclick="navigate('/playlists')" class="dropdown-item">📁 My Playlists</a>
                                <a href="javascript:void(0)" onclick="logout()" class="dropdown-item logout-text">🚪 Sign Out</a>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.warn('Auth check failed:', error);
            }
        }

        async function logout() {
            if (!window.location.protocol.startsWith('blob')) {
                await fetch('/api/logout', { method: 'POST' });
                window.location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        const query = this.value.trim();
                        if (query) window.location.href = '/search?q=' + encodeURIComponent(query);
                    }
                });
            }
            checkAuthStatus();
        });
    </script>
</body>

</html>
