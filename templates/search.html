<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Search Results - FPS Vault</title>
    <style>
        body {
            background: #08080a;
            color: white;
            font-family: sans-serif;
            margin: 0;
        }

        nav {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(8, 8, 10, 0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 4px;
            text-decoration: none;
            cursor: pointer;
            font-style: italic;
            text-shadow: 0 0 10px #e50914, 3px 3px 0px #550000;
            transition: transform 0.3s ease, text-shadow 0.3s ease;
        }

        .logo span {
            color: #e50914;
            text-shadow: 3px 3px 0px #222;
        }

        .logo:hover {
            transform: scale(1.05) skewX(-5deg);
            text-shadow: 0 0 20px #e50914, 4px 4px 0px #550000;
        }

        .search-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 0 40px;
        }

        .search-bar {
            width: 100%;
            max-width: 650px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s, background 0.3s;
        }

        .search-bar:focus {
            border-color: #e50914;
            background: rgba(0, 0, 0, 0.8);
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-links a {
            color: #f5f5f5;
            text-decoration: none;
            font-size: 18px;
            transition: color 0.2s, transform 0.2s, background 0.2s;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: #e50914;
        }

        .nav-links a.playlist-link {
            color: #aaa;
            font-weight: 600;
        }

        .nav-links a.playlist-link:hover {
            color: #ffd700;
            transform: scale(1.05);
        }

        .nav-links a.logout-btn {
            color: #888;
            background: transparent;
            padding: 5px 12px;
            border-radius: 4px;
            font-weight: 600;
        }

        .nav-links a.logout-btn:hover {
            background: #e50914;
            color: white;
        }

        .profile-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .profile-btn:hover {
            border-color: #e50914;
        }

        /* Main Layout */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            margin-top: 0;
            font-size: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 30px;
            font-weight: normal;
        }

        .query-text {
            color: #fff;
            font-weight: bold;
        }

        /* Vertical Video List Styling */
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            text-decoration: none;
        }

        .thumbnail {
            width: 360px;
            min-width: 360px;
            aspect-ratio: 16/9;
            background: #222;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .thumbnail:hover {
            border-radius: 4px;
        }

        /* Slight animation on hover */

        .v-details {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .v-title {
            font-size: 18px;
            font-weight: normal;
            margin: 0 0 8px 0;
            cursor: pointer;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .v-meta {
            color: #aaa;
            font-size: 12px;
            margin: 0 0 12px 0;
        }

        /* Channel Link Styling */
        .channel-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
        }

        .channel-info:hover .c-name {
            color: #fff;
        }

        .c-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .c-name {
            color: #aaa;
            font-size: 12px;
        }

        /* Fake Description for aesthetic */
        .v-desc {
            color: #888;
            font-size: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin: 0;
        }
    </style>
</head>

<body>

    <nav>
        <a href="javascript:void(0)" class="logo" onclick="navigate('/')">FPS<span>-</span>VAULT</a>
        <div class="search-container">
            <input id="search-input" class="search-bar" type="text"
                placeholder="Search live streams, channels, or games...">
        </div>
        <div class="nav-links" id="auth-section">
            <a href="/login" style="color: white; font-weight: bold;">Login</a>
            <a href="/register"
                style="background: #e50914; padding: 5px 15px; border-radius: 4px; color: white; text-decoration: none;">Sign
                Up</a>
        </div>
    </nav>

    <div class="container">
        <h1>Search results for <span class="query-text" id="display-query">...</span></h1>

        <div id="loading" style="color: #888;">Scanning the vault...</div>

        <div class="video-list" id="results-list">
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const searchQuery = urlParams.get('q');

        document.getElementById('display-query').innerText = `"${searchQuery || ''}"`;
        document.getElementById('search-input').value = searchQuery || '';

        async function performSearch() {
            if (!searchQuery) {
                document.getElementById('loading').innerText = "Please enter a search term.";
                return;
            }

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(searchQuery)}`);
                const videos = await res.json();

                const list = document.getElementById('results-list');
                document.getElementById('loading').style.display = 'none';

                if (videos.error) {
                    list.innerHTML = `<h3 style="color: #e50914;">Backend Error: ${videos.error}</h3>`;
                    return;
                }

                if (videos.length === 0) {
                    list.innerHTML = '<h3 style="color: #aaa;">No videos found matching that search.</h3>';
                    return;
                }

                videos.forEach(v => {
                    // Google Drive Thumbnails
                    let thumbUrl = v.thumbnail_url;
                    if (thumbUrl && thumbUrl.includes('drive.google.com')) {
                        const match = thumbUrl.match(/[\/?]id=(.*?)(&|$)/) || thumbUrl.match(/\/d\/(.*?)\//);
                        if (match) thumbUrl = `/api/proxy_thumb/${match[1]}`;
                    }

                    const row = document.createElement('div');
                    row.className = 'video-row';

                    row.innerHTML = `
                        <div class="thumbnail" style="background-image: url('${thumbUrl || ''}')" onclick="window.location.href='/watch/${v.video_id}'"></div>
                        <div class="v-details">
                            <h3 class="v-title" onclick="window.location.href='/watch/${v.video_id}'">${v.title}</h3>
                            <p class="v-meta">${v.views_count} views • ${v.likes_cnt || 0} likes • ${v.date}</p>
                            
                            <div class="channel-info" onclick="window.location.href='/channel/${v.channel_id}'">
                                <div class="c-avatar">${v.channel_name.charAt(0).toUpperCase()}</div>
                                <span class="c-name">${v.channel_name}</span>
                            </div>
                            
                            <p class="v-desc">Check out this amazing upload from ${v.channel_name}. Subscribe for more highlights, tutorials, and gameplay.</p>
                        </div>
                    `;
                    list.appendChild(row);
                });

            } catch (err) {
                console.error("Search failed:", err);
                document.getElementById('loading').innerText = "System error while searching.";
            }
        }

        performSearch();

        document.getElementById('search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const newQuery = this.value.trim();
                if (newQuery) window.location.href = '/search?q=' + encodeURIComponent(newQuery);
            }
        });
    </script>
    <script>
        function navigate(path) {
            if (window.location.protocol.startsWith('blob')) {
                const msg = document.createElement('div');
                msg.innerText = `Redirecting to ${path}...`;
                msg.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#e50914; color:white; padding:10px 20px; border-radius:20px; z-index:9999; font-weight:bold;";
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 1500);
            } else {
                window.location.href = path;
            }
        }

        async function checkAuthStatus() {
            const authSection = document.getElementById('auth-section');
            if (!authSection) return;
            try {
                if (window.location.protocol.startsWith('blob')) return;
                const response = await fetch('/api/current_user');
                const data = await response.json();
                if (data.logged_in) {
                    authSection.innerHTML = `
                        <span style="font-weight: bold; color: #e50914;">Welcome, ${data.username}</span>
                        <a href="javascript:void(0)" onclick="navigate('/upload')" class="playlist-link" style="text-decoration: none;">+ Upload</a>
                        <a href="javascript:void(0)" onclick="navigate('/playlists')" class="playlist-link" style="text-decoration: none;">Playlists</a>
                        <a href="javascript:void(0)" onclick="logout()" class="logout-btn" style="text-decoration: none;">Logout</a>
                        <div class="profile-btn" onclick="navigate('/profile')"></div>
                    `;
                }
            } catch (error) {
                console.warn('Auth check failed:', error);
            }
        }

        async function logout() {
            if (!window.location.protocol.startsWith('blob')) {
                await fetch('/api/logout', { method: 'POST' });
                window.location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        const query = this.value.trim();
                        if (query) window.location.href = '/search?q=' + encodeURIComponent(query);
                    }
                });
            }
            checkAuthStatus();
        });
    </script>
</body>

</html>
