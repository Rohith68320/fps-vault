<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watch - FPS Vault</title>
    <style>
        body { background: #08080a; color: white; font-family: sans-serif; margin: 0; }
        nav { background: rgba(8, 8, 10, 0.9); padding: 15px 40px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .logo { font-size: 24px; font-weight: 900; color: #fff; text-decoration: none; font-style: italic; }
        .logo span { color: #e50914; }

        .watch-container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        
        /* The Video Player */
        .video-player-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .video-player-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        /* Video Info Area */
        .video-info { margin-top: 20px; }
        .video-tags { color: #e50914; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .video-title { font-size: 24px; margin: 0 0 10px 0; }
        
        .stats-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 15px; }
        .views-date { color: #aaa; font-size: 14px; }
        
        .actions-btn {
            background: #222; color: white; border: none; padding: 10px 20px;
            border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s;
            display: flex; gap: 8px; align-items: center;
        }
        .actions-btn:hover { background: #333; }

        /* Channel & Description */
        .channel-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .channel-info { display: flex; align-items: center; gap: 15px; }
        .channel-avatar { width: 45px; height: 45px; background: #e50914; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .channel-name { font-weight: bold; font-size: 16px; margin: 0; }
        .channel-subs { color: #aaa; font-size: 13px; margin: 0; }
        
        .btn-subscribe { background: white; color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .btn-subscribe:hover { background: #ddd; }

        .description-box { background: #1a1a1a; padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.5; color: #eee; }
        
        /* Loading text */
        #loading { text-align: center; padding: 50px; font-size: 20px; color: #888; }
        #content { display: none; }

        /* Sidebar Playlist UI */
        .sidebar-playlist-thumb {
            position: relative;
            width: 140px; min-width: 140px; aspect-ratio: 16/9;
            background: #111; border-radius: 8px; overflow: hidden;
            background-size: cover; background-position: center; cursor: pointer;
        }
        .sidebar-playlist-overlay {
            position: absolute; right: 0; top: 0; bottom: 0; width: 40%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(2px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-playlist-icon { width: 20px; height: 20px; fill: white; margin-bottom: 4px; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">FPS<span>-</span>VAULT</a>
        <a href="/" style="color: #aaa; text-decoration: none;">← Home</a>
    </nav>

    <div class="watch-container" style="display: flex; gap: 30px; align-items: flex-start; max-width: 1400px;">
    
    <div style="flex: 7; min-width: 0;">
        <div id="loading">Loading secure video link...</div>
        
        <div id="content" style="display: none;">
            <div class="video-player-wrapper" style="position: relative; width: 100%; aspect-ratio: 16/9; background: black; border-radius: 12px; overflow: hidden;">
                <iframe id="video-iframe" style="width: 100%; height: 100%; border: none; display: none;" allowfullscreen></iframe>
                <div id="video-poster" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; cursor: pointer; display: flex; justify-content: center; align-items: center;">
                    <div style="width: 70px; height: 50px; background: rgba(229, 9, 20, 0.9); border-radius: 12px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
                        <span style="color: white; font-size: 24px;">▶</span>
                    </div>
                </div>
            </div>

            <div class="video-info">
                <div class="video-tags" id="v-tags"></div>
                <h1 class="video-title" id="v-title">Title</h1>
                
                <div class="stats-row">
                    <div class="views-date"><span id="v-views">0</span> views • <span id="v-date">Date</span></div>
                    <div style="display: flex; gap: 10px;">
                        <button id="like-btn" class="actions-btn">👍 <span id="v-likes">0</span></button>
                        <button id="save-btn" class="actions-btn">💾 Save</button>
                        <button id="report-btn" class="actions-btn" style="color: #aaa;">🚩 Report</button>
                    </div>
                </div>

                <div class="channel-row">
                    <div class="channel-info" onclick="window.location.href='/channel/' + currentChannelId" style="cursor: pointer;">
                        <div class="channel-avatar" id="c-avatar">C</div>
                        <div>
                            <p class="channel-name" id="c-name">Channel Name</p>
                            <p class="channel-subs"><span id="c-subs">0</span> subscribers</p>
                        </div>
                    </div>
                    <button id="sub-btn" class="btn-subscribe">Subscribe</button>
                </div>

                <div class="description-box" id="v-desc"></div>
                
                <div style="margin-top: 40px; border-top: 1px solid #222; padding-top: 20px;">
                    <h3>Comments</h3>
                    <div id="comment-form-container" style="display: none; margin-bottom: 30px;">
                        <textarea id="new-comment-text" placeholder="Add a public comment..." style="width: 100%; padding: 12px; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 8px; margin-bottom: 10px;"></textarea>
                        <button id="submit-comment-btn" class="actions-btn" style="background: #e50914;">Post Comment</button>
                    </div>
                    <div id="login-prompt" style="color: #aaa; margin-bottom: 30px; font-style: italic;">Log in to leave a comment.</div>
                    <div id="comments-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="recommendations-sidebar" style="flex: 3; background: #111; padding: 20px; border-radius: 12px; min-width: 300px;">
        
        <div id="playlist-queue-container" style="display: none; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 15px; margin-bottom: 25px;">
            <h3 id="pq-title" style="margin: 0 0 5px 0; font-size: 16px; color: white;">Playlist Name</h3>
            <p id="pq-meta" style="margin: 0 0 15px 0; font-size: 12px; color: #aaa;">1 / 10</p>
            
            <div id="pq-list" style="max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px;">
                </div>
        </div>

        <h3 style="margin-top: 0; color: #fff;">Up Next</h3>
        <div id="recs-list">
            </div>
    </div>

    <div id="save-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;">
        <div style="background: #1a1a1a; padding: 25px; border-radius: 12px; width: 320px; border: 1px solid #333;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0; color: white;">Save to...</h3>
                <span onclick="document.getElementById('save-modal').style.display='none'" style="cursor: pointer; font-size: 20px; color: #aaa;">✖</span>
            </div>
            
            <div id="modal-playlist-list" style="max-height: 250px; overflow-y: auto; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px;">
                <div style="color: #888; text-align: center;">Loading your playlists...</div>
            </div>

            <div style="border-top: 1px solid #333; padding-top: 15px; text-align: center;">
                <button onclick="window.location.href='/playlists'" style="background: transparent; color: #e50914; border: none; font-weight: bold; cursor: pointer;">+ Manage Playlists</button>
            </div>
        </div>
    </div>

    <div id="report-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;">
        <div style="background: #1a1a1a; padding: 25px; border-radius: 12px; width: 350px; border: 1px solid #333;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0; color: white;">Report Video</h3>
                <span onclick="document.getElementById('report-modal').style.display='none'" style="cursor: pointer; font-size: 20px; color: #aaa;">✖</span>
            </div>
            
            <p style="color: #aaa; font-size: 13px; margin-top: 0;">What is the issue with this video?</p>
            
            <select id="report-category" style="width: 100%; padding: 10px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 6px; outline: none;">
                <option value="spam">Spam or misleading</option>
                <option value="harassment">Harassment or bullying</option>
                <option value="copyright">Copyright violation</option>
            </select>

            <textarea id="report-desc" placeholder="Provide more details..." style="width: 100%; height: 80px; padding: 10px; margin-bottom: 20px; background: #222; border: 1px solid #444; color: white; border-radius: 6px; outline: none; resize: none; box-sizing: border-box;"></textarea>

            <button id="submit-report-btn" style="width: 100%; background: #e50914; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer;">Submit Report</button>
        </div>
    </div>
</div>

    <script>
        // --- SEARCH BAR LOGIC (BULLETPROOF VERSION) ---
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('search-input');
            
            if (searchInput) {
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        const query = this.value.trim();
                        if (query) {
                            window.location.href = '/search?q=' + encodeURIComponent(query);
                        }
                    }
                });
            } else {
                // If it still fails, it will yell at us in the console!
                console.error("DEBUG: Could not find the search bar ID in the HTML!");
            }
        });
        
        // Extract the video ID from the URL (e.g., /watch/1 -> 1)
        const videoId = window.location.pathname.split('/').pop();

        async function loadVideo() {
            try {
                // --- FETCH VIDEO DATA ---
                const res = await fetch(`/api/watch/${videoId}`);
                if (!res.ok) throw new Error("Video not found");
                const data = await res.json();
                
                window.currentChannelId = data.channel_id;
                
                // --- 1. SET THE VIDEO SOURCE ---
                const iframe = document.getElementById('video-iframe');
                const posterDiv = document.getElementById('video-poster');

                let embedUrl = data.drive_link;
                if (embedUrl && embedUrl.includes('drive.google.com')) {
                    const match = embedUrl.match(/[\/?]id=(.*?)(&|$)/) || embedUrl.match(/\/d\/(.*?)\//);
                    if (match && match[1]) {
                        embedUrl = `https://drive.google.com/file/d/${match[1]}/preview`;
                    }
                }
                iframe.src = embedUrl;

                // --- 2. SET THE THUMBNAIL POSTER ---
                let posterUrl = data.thumbnail_url;
                if (posterUrl) {
                    if (posterUrl.includes('drive.google.com/file/d/')) {
                        const match = posterUrl.match(/\/d\/(.*?)\//);
                        if (match && match[1]) posterUrl = `/api/proxy_thumb/${match[1]}`;
                    } else if (posterUrl.includes('drive.google.com/uc')) {
                        const match = posterUrl.match(/id=(.*?)(&|$)/);
                        if (match && match[1]) posterUrl = `/api/proxy_thumb/${match[1]}`;
                    }
                    posterDiv.style.backgroundImage = `url('${posterUrl}')`;
                } else {
                    posterDiv.style.backgroundColor = '#1a1a1a';
                }

                // --- 3. CLICK-TO-PLAY ---
                posterDiv.onclick = () => {
                    posterDiv.style.display = 'none';
                    iframe.style.display = 'block';
                };

                // --- 4. POPULATE METADATA ---
                document.getElementById('v-title').innerText = data.title;
                document.getElementById('v-views').innerText = data.views_cnt;
                document.getElementById('v-likes').innerText = data.likes_cnt;
                document.getElementById('v-date').innerText = data.upload_date;
                document.getElementById('v-desc').innerText = data.description || "No description provided.";
                
                document.getElementById('c-name').innerText = data.channel_name;
                document.getElementById('c-subs').innerText = data.subscriber_cnt;
                document.getElementById('c-avatar').innerText = data.channel_name.charAt(0).toUpperCase();

                if (data.tags && data.tags.length > 0) {
                    document.getElementById('v-tags').innerText = data.tags.map(t => '#' + t).join(' ');
                }

                // --- 5. COMMENTS LOGIC ---
                const userRes = await fetch('/api/current_user');
                const userData = await userRes.json();
                
                if (userData.logged_in) {
                    document.getElementById('comment-form-container').style.display = 'block';
                    document.getElementById('login-prompt').style.display = 'none';
                }

                async function loadComments() {
                    const cRes = await fetch(`/api/comments/${videoId}`);
                    const comments = await cRes.json();
                    const list = document.getElementById('comments-list');
                    list.innerHTML = ''; 
                    
                    if (comments.length === 0) {
                        list.innerHTML = '<p style="color: #888;">No comments yet. Be the first!</p>';
                    } else {
                        comments.forEach(c => {
                            const div = document.createElement('div');
                            div.style.cssText = "margin-bottom: 20px; background: #111; padding: 15px; border-radius: 8px;";
                            div.innerHTML = `
                                <div style="font-weight: bold; margin-bottom: 5px; color: #ccc;">
                                    ${c.username} <span style="font-weight: normal; font-size: 12px; color: #666; margin-left: 10px;">${c.date}</span>
                                </div>
                                <div style="line-height: 1.4;">${c.content}</div>
                            `;
                            list.appendChild(div);
                        });
                    }
                }
                await loadComments();

                document.getElementById('submit-comment-btn').onclick = async () => {
                    const box = document.getElementById('new-comment-text');
                    const text = box.value;
                    if (!text) return;
                    
                    const postRes = await fetch(`/api/add_comment/${videoId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text })
                    });
                    
                    if (postRes.ok) {
                        box.value = '';
                        await loadComments();
                    } else {
                        const err = await postRes.json();
                        alert("Error: " + err.error);
                    }
                };

                // --- 6. RECOMMENDATIONS LOGIC ---
                async function loadRecommendations() {
                    const rRes = await fetch(`/api/recommendations/${videoId}`);
                    const recs = await rRes.json();
                    const list = document.getElementById('recs-list');
                    list.innerHTML = '';

                    recs.forEach(v => {
                        const div = document.createElement('div');
                        div.style.cssText = "display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start;";
                        
                        let thumb = v.thumbnail_url;
                        if (thumb && thumb.includes('drive.google.com')) {
                            const match = thumb.match(/[\/?]id=(.*?)(&|$)/) || thumb.match(/\/d\/(.*?)\//);
                            if (match) thumb = `/api/proxy_thumb/${match[1]}`;
                        }

                        div.innerHTML = `
                            <div onclick="window.location.href='/watch/${v.video_id}'" 
                                style="width: 140px; min-width: 140px; aspect-ratio: 16/9; background-image: url('${thumb}'); background-size: cover; border-radius: 8px; cursor: pointer; position: relative;">
                            </div>
                            <div style="flex: 1; min-width: 0;">
                                <div onclick="window.location.href='/watch/${v.video_id}'" 
                                    style="font-size: 14px; font-weight: bold; line-height: 1.3; margin-bottom: 4px; cursor: pointer; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                                    ${v.title}
                                </div>
                                <div onclick="window.location.href='/channel/${v.channel_id}'" 
                                    style="font-size: 12px; color: #aaa; cursor: pointer; margin-bottom: 2px;">
                                    ${v.channel_name}
                                </div>
                                <div style="font-size: 11px; color: #888;">
                                    ${v.views_count} views • ${v.likes_cnt} likes
                                </div>
                            </div>
                        `;
                        list.appendChild(div);
                    });
                }
                await loadRecommendations();

                // --- 7. PLAYLIST QUEUE LOGIC ---
                async function loadPlaylistQueue() {
                    const urlParams = new URLSearchParams(window.location.search);
                    const activePlaylistId = urlParams.get('list');
                    if (!activePlaylistId) return;

                    try {
                        const plRes = await fetch(`/api/playlists/${activePlaylistId}`);
                        const plData = await plRes.json();
                        
                        if (plData.error || !plData.videos) return;

                        document.getElementById('playlist-queue-container').style.display = 'block';
                        document.getElementById('pq-title').innerText = plData.name;
                        
                        const pqList = document.getElementById('pq-list');
                        pqList.innerHTML = '';
                        let currentIndex = 0;

                        plData.videos.forEach((v, index) => {
                            const isPlaying = (v.video_id == videoId);
                            if (isPlaying) currentIndex = index + 1;

                            const row = document.createElement('div');
                            row.style.cssText = `display: flex; gap: 10px; align-items: center; padding: 8px; border-radius: 6px; cursor: pointer; background: ${isPlaying ? '#333' : 'transparent'};`;
                            row.onclick = () => window.location.href = `/watch/${v.video_id}?list=${activePlaylistId}`;

                            row.innerHTML = `
                                <span style="font-size: 12px; color: ${isPlaying ? '#e50914' : '#888'}; font-weight: bold; width: 15px;">${isPlaying ? '▶' : (index + 1)}</span>
                                <div style="flex: 1; min-width: 0;">
                                    <div style="font-size: 13px; font-weight: bold; color: ${isPlaying ? '#fff' : '#ccc'}; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${v.title}</div>
                                    <div style="font-size: 11px; color: #888;">${v.channel_name}</div>
                                </div>
                            `;
                            pqList.appendChild(row);
                        });

                        document.getElementById('pq-meta').innerText = `${currentIndex} / ${plData.videos.length}`;
                        if (currentIndex > 3) pqList.scrollTop = (currentIndex - 2) * 50; 

                    } catch (err) {
                        console.error("Failed to load playlist queue:", err);
                    }
                }
                await loadPlaylistQueue();

                // --- 8. SIDEBAR PLAYLISTS LOGIC ---
                async function loadSidebarPlaylists() {
                    try {
                        const pRes = await fetch('/api/feed/playlists');
                        const playlists = await pRes.json();
                        const list = document.getElementById('recs-list');

                        playlists.slice(0, 2).forEach(p => {
                            const div = document.createElement('div');
                            div.style.cssText = "display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start;";

                            let thumb = p.thumbnail_url;
                            if (thumb && thumb.includes('drive.google.com')) {
                                const match = thumb.match(/[\/?]id=(.*?)(&|$)/) || thumb.match(/\/d\/(.*?)\//);
                                if (match) thumb = `/api/proxy_thumb/${match[1]}`;
                            }

                            div.innerHTML = `
                                <div class="sidebar-playlist-thumb" style="background-image: url('${thumb}');" onclick="window.location.href='/play/playlist/${p.playlist_id}'">
                                    <div class="sidebar-playlist-overlay">
                                        <svg class="sidebar-playlist-icon" viewBox="0 0 24 24">
                                            <path d="M22 7H2v1h20V7zm-9 5H2v-1h11v1zm0 4H2v-1h11v1zm2 3v-8l7 4-7 4z"></path>
                                        </svg>
                                        <span style="font-weight: bold; font-size: 12px;">${p.video_count}</span>
                                    </div>
                                </div>
                                <div style="flex: 1; min-width: 0;">
                                    <div style="font-size: 14px; font-weight: bold; line-height: 1.3; margin-bottom: 4px; cursor: pointer; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;" onclick="window.location.href='/play/playlist/${p.playlist_id}'">
                                        ${p.name}
                                    </div>
                                    <div style="font-size: 12px; color: #aaa; cursor: pointer; margin-bottom: 2px;">
                                        Mix by ${p.channel_name}
                                    </div>
                                    <div style="font-size: 11px; color: #e50914; font-weight: bold; margin-top: 4px;">
                                        VIEW FULL PLAYLIST
                                    </div>
                                </div>
                            `;
                            list.appendChild(div); 
                        });
                    } catch (err) {
                        console.error("Failed to load sidebar playlists", err);
                    }
                }
                await loadSidebarPlaylists();

                // --- 9. LIKE & SUBSCRIBE LOGIC ---
                const likeBtn = document.getElementById('like-btn');
                const subBtn = document.getElementById('sub-btn');
                
                if (data.user_liked) likeBtn.style.background = "#e50914";
                if (data.user_subscribed) {
                    subBtn.style.background = "#333";
                    subBtn.style.color = "white";
                    subBtn.innerText = "Subscribed";
                }

                likeBtn.onclick = async () => {
                    const res = await fetch(`/api/toggle_like/${videoId}`, { method: 'POST' });
                    if (res.status === 401) return alert("Please log in to like this video!");
                    
                    const result = await res.json();
                    if (res.ok) {
                        document.getElementById('v-likes').innerText = result.likes_cnt;
                        likeBtn.style.background = result.liked ? "#e50914" : "#222";
                    }
                };

                subBtn.onclick = async () => {
                    const res = await fetch(`/api/toggle_subscribe/${data.channel_id}`, { method: 'POST' });
                    if (res.status === 401) return alert("Please log in to subscribe!");
                    
                    const result = await res.json();
                    if (res.ok) {
                        document.getElementById('c-subs').innerText = result.subscriber_cnt;
                        if (result.subscribed) {
                            subBtn.style.background = "#333";
                            subBtn.style.color = "white";
                            subBtn.innerText = "Subscribed";
                        } else {
                            subBtn.style.background = "white";
                            subBtn.style.color = "black";
                            subBtn.innerText = "Subscribe";
                        }
                    }
                };

                // --- 10. SAVE TO PLAYLIST LOGIC ---
                const saveBtn = document.getElementById('save-btn');
                const saveModal = document.getElementById('save-modal');
                const playlistList = document.getElementById('modal-playlist-list');

                saveBtn.onclick = async () => {
                    saveModal.style.display = 'flex'; 
                    playlistList.innerHTML = '<div style="color: #888; text-align: center;">Loading your playlists...</div>';

                    try {
                        const pRes = await fetch('/api/playlists');
                        if (pRes.status === 401) {
                            saveModal.style.display = 'none';
                            return alert("Please log in to save videos!");
                        }
                        
                        const userPlaylists = await pRes.json();
                        playlistList.innerHTML = ''; 
                        
                        if (userPlaylists.length === 0) {
                            playlistList.innerHTML = '<div style="color: #aaa; text-align: center;">No playlists found. Create one first!</div>';
                            return;
                        }

                        userPlaylists.forEach(p => {
                            const row = document.createElement('div');
                            row.style.cssText = "display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #222; border-radius: 6px;";
                            
                            const visibilityIcon = p.visibility === 'public' ? '🌍' : '🔒';
                            row.innerHTML = `
                                <span style="font-weight: bold; font-size: 14px;">${p.name} <span style="font-size: 10px;">${visibilityIcon}</span></span>
                                <button class="add-to-pl-btn" style="background: #e50914; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">Add</button>
                            `;

                            row.querySelector('.add-to-pl-btn').onclick = async function() {
                                const addRes = await fetch(`/api/playlists/${p.playlist_id}/add_video`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ video_id: videoId })
                                });
                                
                                if (addRes.ok) {
                                    this.innerText = "Saved!";
                                    this.style.background = "#4CAF50"; 
                                    setTimeout(() => saveModal.style.display = 'none', 1000); 
                                }
                            };
                            playlistList.appendChild(row);
                        });
                    } catch (err) {
                        console.error("Failed to fetch playlists:", err);
                    }
                };

                // --- 11. REPORT VIDEO LOGIC ---
                const reportBtn = document.getElementById('report-btn');
                const reportModal = document.getElementById('report-modal');
                const submitReportBtn = document.getElementById('submit-report-btn');

                reportBtn.onclick = () => {
                    reportModal.style.display = 'flex';
                };

                submitReportBtn.onclick = async () => {
                    const category = document.getElementById('report-category').value;
                    const desc = document.getElementById('report-desc').value;

                    if (!desc.trim()) return alert("Please provide some details.");

                    try {
                        const res = await fetch('/api/report/video', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ video_id: videoId, category: category, description: desc })
                        });

                        if (res.status === 401) {
                            alert("Please log in to report videos.");
                            reportModal.style.display = 'none';
                            return;
                        }

                        if (res.ok) {
                            alert("Report submitted to our staff. Thank you.");
                            reportModal.style.display = 'none';
                            document.getElementById('report-desc').value = ''; 
                        } else {
                            const err = await res.json();
                            alert("Error: " + err.error);
                        }
                    } catch (error) {
                        console.error("Report failed:", error);
                    }
                };

                // Reveal UI at the very end
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (error) {
                console.error("DEBUG ERROR:", error); 
                document.getElementById('loading').innerText = "❌ Error: " + error.message;
            }
        }

        loadVideo();

        // --- NEW: DURATION TRACKER ---
        // Since Google Drive iframes hide the exact video time, we track how many seconds 
        // the user has kept the video page open and active!
        let secondsWatched = 0;
        
        setInterval(() => {
            // Only count if the thumbnail is hidden (meaning the video is playing!)
            const poster = document.getElementById('video-poster');
            if (poster && poster.style.display === 'none') {
                secondsWatched += 5; // Add 5 seconds
                
                // Ping the backend to save progress
                fetch('/api/history/progress', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ video_id: videoId, progress: secondsWatched })
                });
            }
        }, 5000); // Runs every 5 seconds
    </script>
</body>
</html>
