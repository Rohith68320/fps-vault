<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Upload Video - FPS Vault</title>
    <style>
        body {
            background: #08080a;
            color: white;
            font-family: sans-serif;
            margin: 0;
        }

        nav {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(8, 8, 10, 0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 4px;
            text-decoration: none;
            cursor: pointer;
            font-style: italic;
            text-shadow: 0 0 10px #e50914, 3px 3px 0px #550000;
            transition: transform 0.3s ease, text-shadow 0.3s ease;
        }

        .logo span {
            color: #e50914;
            text-shadow: 3px 3px 0px #222;
        }

        .logo:hover {
            transform: scale(1.05) skewX(-5deg);
            text-shadow: 0 0 20px #e50914, 4px 4px 0px #550000;
        }

        .search-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 0 40px;
        }

        .search-bar {
            width: 100%;
            max-width: 650px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s, background 0.3s;
        }

        .search-bar:focus {
            border-color: #e50914;
            background: rgba(0, 0, 0, 0.8);
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-links a {
            color: #f5f5f5;
            text-decoration: none;
            font-size: 18px;
            transition: color 0.2s, transform 0.2s, background 0.2s;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: #e50914;
        }

        .nav-links a.playlist-link {
            color: #aaa;
            font-weight: 600;
        }

        .nav-links a.playlist-link:hover {
            color: #ffd700;
            transform: scale(1.05);
        }

        .nav-links a.logout-btn {
            color: #888;
            background: transparent;
            padding: 5px 12px;
            border-radius: 4px;
            font-weight: 600;
        }

        .nav-links a.logout-btn:hover {
            background: #e50914;
            color: white;
        }

        .profile-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .profile-btn:hover {
            border-color: #e50914;
        }

        .upload-container {
            max-width: 600px;
            margin: 50px auto;
            background: #141414;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ccc;
        }

        input[type="text"],
        input[type="url"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            background: #0a0a0c;
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Side-by-side grid for shorter inputs */
        .row {
            display: flex;
            gap: 15px;
        }

        .row .form-group {
            flex: 1;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #ff0a16;
        }

        .btn-submit:disabled {
            background: #555;
            cursor: not-allowed;
        }

        #status-msg {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <nav>
        <a href="javascript:void(0)" class="logo" onclick="navigate('/')">FPS<span>-</span>VAULT</a>
        <div class="search-container">
            <input id="search-input" class="search-bar" type="text"
                placeholder="Search live streams, channels, or games...">
        </div>
        <div class="nav-links" id="auth-section">
            <a href="/login" style="color: white; font-weight: bold;">Login</a>
            <a href="/register"
                style="background: #e50914; padding: 5px 15px; border-radius: 4px; color: white; text-decoration: none;">Sign
                Up</a>
        </div>
    </nav>

    <div class="upload-container">
        <h1>Link a Video</h1>
        <form id="uploadForm">
            <div class="form-group">
                <label>Video Title</label>
                <input type="text" id="title" required placeholder="Epic 1v5 Clutch...">
            </div>

            <div class="form-group">
                <label>Google Drive Shareable Link (Video)</label>
                <input type="url" id="driveLink" required placeholder="https://drive.google.com/file/d/...">
            </div>

            <div class="form-group">
                <label>Thumbnail Image Link</label>
                <input type="url" id="thumbnailUrl" required placeholder="Direct link to image (Imgur, Drive, etc.)">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Duration (Seconds)</label>
                    <input type="number" id="duration" required placeholder="e.g., 120">
                </div>
                <div class="form-group">
                    <label>Visibility</label>
                    <select id="visibility">
                        <option value="public">Public</option>
                        <option value="private">Private</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Tags (Comma separated)</label>
                <input type="text" id="tags" placeholder="gaming, clutch, valorant">
                <div id="suggested-tags" style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px;"></div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" placeholder="Tell viewers about your video..."></textarea>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Submit Video</button>
            <div id="status-msg"></div>
        </form>
    </div>

    <script>
        // NEW: Fetch and display existing tags when the page loads
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/tags');
                const tags = await response.json();
                const container = document.getElementById('suggested-tags');

                tags.forEach(tag => {
                    const badge = document.createElement('span');
                    badge.innerText = tag;
                    // Styling for the tag pill
                    badge.style.cssText = "background: #222; padding: 5px 12px; border-radius: 20px; font-size: 13px; color: #ccc; cursor: pointer; border: 1px solid #444; transition: 0.2s;";

                    // Hover effect
                    badge.onmouseover = () => badge.style.background = "#e50914";
                    badge.onmouseout = () => badge.style.background = "#222";

                    // When clicked, add it to the input box!
                    badge.onclick = () => {
                        const input = document.getElementById('tags');
                        if (input.value.length > 0 && !input.value.endsWith(', ')) {
                            input.value += ', ' + tag;
                        } else {
                            input.value += tag;
                        }
                    };
                    container.appendChild(badge);
                });
            } catch (error) {
                console.error("Failed to load tags:", error);
            }
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('status-msg');

            submitBtn.disabled = true;
            submitBtn.innerText = "Saving to Database...";
            statusMsg.innerText = "";

            // Gather ALL the inputs!
            const payload = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                drive_link: document.getElementById('driveLink').value,
                thumbnail_url: document.getElementById('thumbnailUrl').value,
                duration: document.getElementById('duration').value,
                visibility: document.getElementById('visibility').value,
                tags: document.getElementById('tags').value
            };

            try {
                const response = await fetch('/api/upload_video', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    statusMsg.style.color = "#4CAF50";
                    statusMsg.innerText = "Success! Redirecting to your channel...";
                    setTimeout(() => window.location.href = data.redirect, 1500);
                } else {
                    statusMsg.style.color = "#e50914";
                    statusMsg.innerText = "Error: " + data.error;
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit Video";
                }
            } catch (error) {
                statusMsg.style.color = "#e50914";
                statusMsg.innerText = "A network error occurred.";
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Video";
            }
        });
    </script>
    <script>
        function navigate(path) {
            if (window.location.protocol.startsWith('blob')) {
                const msg = document.createElement('div');
                msg.innerText = `Redirecting to ${path}...`;
                msg.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#e50914; color:white; padding:10px 20px; border-radius:20px; z-index:9999; font-weight:bold;";
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 1500);
            } else {
                window.location.href = path;
            }
        }

        async function checkAuthStatus() {
            const authSection = document.getElementById('auth-section');
            if (!authSection) return;
            try {
                if (window.location.protocol.startsWith('blob')) return;
                const response = await fetch('/api/current_user');
                const data = await response.json();
                if (data.logged_in) {
                    authSection.innerHTML = `
                        <span style="font-weight: bold; color: #e50914;">Welcome, ${data.username}</span>
                        <a href="javascript:void(0)" onclick="navigate('/upload')" class="playlist-link" style="text-decoration: none;">+ Upload</a>
                        <a href="javascript:void(0)" onclick="navigate('/playlists')" class="playlist-link" style="text-decoration: none;">Playlists</a>
                        <a href="javascript:void(0)" onclick="logout()" class="logout-btn" style="text-decoration: none;">Logout</a>
                        <div class="profile-btn" onclick="navigate('/profile')"></div>
                    `;
                }
            } catch (error) {
                console.warn('Auth check failed:', error);
            }
        }

        async function logout() {
            if (!window.location.protocol.startsWith('blob')) {
                await fetch('/api/logout', { method: 'POST' });
                window.location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        const query = this.value.trim();
                        if (query) window.location.href = '/search?q=' + encodeURIComponent(query);
                    }
                });
            }
            checkAuthStatus();
        });
    </script>
</body>

</html>
